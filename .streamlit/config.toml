[theme]
base = "light"
primaryColor = "#7FE7DC"
backgroundColor = "#F7F8FA"
secondaryBackgroundColor = "#F2F4F6"
textColor = "#191F28"
linkColor = "#0064FF"
codeBackgroundColor = "#111827"
codeTextColor = "#F9FAFB"
borderColor = "#E5E8EB"
showWidgetBorder = true
showSidebarBorder = true
baseRadius = "16px"
buttonRadius = "14px"
font = "sans-serif"
headingFont = "sans-serif"
codeFont = "monospace"
baseFontSize = 15
baseFontWeight = 400
headingFontSizes = ["36px", "28px", "22px", "18px", "15px", "13px"]
headingFontWeights = [800, 700, 700, 650, 650, 650]

[theme.sidebar]
backgroundColor = "#FBFCFD"
secondaryBackgroundColor = "#F2F4F6"
textColor = "#191F28"
borderColor = "#E5E8EB"
primaryColor = "#7FE7DC"
